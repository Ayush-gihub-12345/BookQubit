# BookQubit Web Configuration (Next.js on Cloudflare)
name = "bookqubit"
main = ".open-next/worker.js"
compatibility_date = "2024-05-01"
workers_dev = true

[[d1_databases]]
binding = "bookqubit_content"
database_name = "bookqubit_content"
database_id = "fe1e41b7-dadf-44b1-86a7-c048ebe662a4"

[[d1_databases]]
binding = "bookqubit_users"
database_name = "bookqubit_users"
database_id = "c6c47a11-a0f6-4b33-bfc6-c75c81fe1283"

[[d1_databases]]
binding = "bookqubit_analytics"
database_name = "bookqubit_analytics"
database_id = "34752d63-c031-402a-9607-7dcdeb47d123"

[env.production]
routes = [
  { pattern = "bookqubit.com/*", zone_name = "bookqubit.com" }
]

[env.production.vars]
NEXT_PUBLIC_API_URL = "https://api.bookqubit.com"
NODE_ENV = "production"

[env.development]
vars.NODE_ENV = "development"
